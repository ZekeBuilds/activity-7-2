  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const canvas = document.getElementById('ballCanvas');
    const ctx    = canvas.getContext('2d');
    const info   = document.getElementById('ballInfo');

    const RADIUS = 18;
    const SPEED  = 4;

    let x, y, dx, dy;

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      if (x === undefined) {
        x  = canvas.width  / 2;
        y  = canvas.height / 2;
        dx = SPEED;
        dy = -SPEED;
      } else {
        x = Math.max(RADIUS, Math.min(canvas.width  - RADIUS, x));
        y = Math.max(RADIUS, Math.min(canvas.height - RADIUS, y));
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Glow trail
      const grad = ctx.createRadialGradient(x, y, 2, x, y, RADIUS * 2.5);
      grad.addColorStop(0, 'rgba(231,76,60,0.18)');
      grad.addColorStop(1, 'rgba(231,76,60,0)');
      ctx.beginPath();
      ctx.arc(x, y, RADIUS * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Ball
      const ballGrad = ctx.createRadialGradient(x - RADIUS * 0.3, y - RADIUS * 0.3, 2, x, y, RADIUS);
      ballGrad.addColorStop(0, '#ff6b6b');
      ballGrad.addColorStop(1, '#c0392b');
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.fillStyle    = ballGrad;
      ctx.shadowColor  = 'rgba(231,76,60,0.6)';
      ctx.shadowBlur   = 18;
      ctx.fill();
      ctx.shadowBlur   = 0;

      // Physics
      x += dx;
      y += dy;

      if (x + RADIUS >= canvas.width  || x - RADIUS <= 0) { dx = -dx; x = Math.max(RADIUS, Math.min(canvas.width  - RADIUS, x)); }
      if (y + RADIUS >= canvas.height || y - RADIUS <= 0) { dy = -dy; y = Math.max(RADIUS, Math.min(canvas.height - RADIUS, y)); }

      if (info) info.textContent = `pos: (${Math.round(x)}, ${Math.round(y)}) · vel: (${dx > 0 ? '+' : ''}${dx}, ${dy > 0 ? '+' : ''}${dy})`;

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
